<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Plugin for drawing vertical lines (annotations) -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.2.1/dist/chartjs-plugin-annotation.min.js"></script>
    <style>
        .loading-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }
        .refresh-spin {
            animation: spin 1s linear infinite;
        }
        /* Custom scrollbar for tight tables */
        .overflow-x-auto::-webkit-scrollbar {
            height: 4px;
        }
        .overflow-x-auto::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        /* Scroll shadow indicators: show shadows at the edges when content is overflowing and not at the end */
        .scroll-shadow-container {
            background:
                /* Shadow covers */
                linear-gradient(to right, white 30%, rgba(255, 255, 255, 0)),
                linear-gradient(to right, rgba(255, 255, 255, 0), white 70%) 100% 0,
                /* Shadows */
                radial-gradient(farthest-side at 0 50%, rgba(0, 0, 0, .12), rgba(0, 0, 0, 0)),
                radial-gradient(farthest-side at 100% 50%, rgba(0, 0, 0, .12), rgba(0, 0, 0, 0)) 100% 0;
            background-repeat: no-repeat;
            background-color: white;
            background-size: 40px 100%, 40px 100%, 14px 100%, 14px 100%;
            background-attachment: local, local, scroll, scroll;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-900">

    <div class="max-w-4xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-6">
            <h1 class="text-3xl font-extrabold text-blue-800 mb-2">Race Results</h1>
        </header>

        <!-- Race Selector Section (Space-saving flat layout) -->
        <div class="mb-6 px-1">
            <div class="flex items-center gap-2 w-full">
                <!-- Race Selector -->
                <div class="flex-1 min-w-0">
                    <select
                        id="raceSelect"
                        onchange="handleRaceChange()"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-white font-semibold text-blue-900 truncate"
                    >
                        <option value="">Loading races...</option>
                    </select>
                </div>

                <!-- Refresh Button -->
                <button
                    onclick="refreshData()"
                    id="refreshBtn"
                    title="Refresh data from sheet"
                    class="flex-shrink-0 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-all flex items-center justify-center shadow-sm active:transform active:scale-95"
                >
                    <svg id="refreshIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
                </button>
            </div>
            <div id="statusMessage" class="mt-2 text-sm hidden font-medium"></div>
        </div>

        <!-- Filter & Search Box -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-8 space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Class Filter Group -->
                <div class="w-full">
                    <label for="classSelect" class="block text-xs font-bold text-gray-400 uppercase mb-1 px-1">Class</label>
                    <div class="flex items-center gap-2">
                        <select
                            id="classSelect"
                            onchange="handleClassChange()"
                            disabled
                            class="flex-grow px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-white disabled:bg-gray-100 disabled:cursor-not-allowed"
                        >
                            <option value="">All Classes</option>
                        </select>
                        <button
                            onclick="clearClassFilter()"
                            title="Clear Class Filter"
                            class="flex-shrink-0 p-3 text-gray-400 hover:text-red-500 transition-colors bg-white border border-gray-300 rounded-lg shadow-sm active:bg-gray-50"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                </div>

                <!-- Racer Filter Group -->
                <div class="w-full">
                    <label for="bibSelect" class="block text-xs font-bold text-gray-400 uppercase mb-1 px-1">Racer</label>
                    <div class="flex items-center gap-2">
                        <select
                            id="bibSelect"
                            onchange="handleSelectionChange()"
                            disabled
                            class="flex-grow px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-white disabled:bg-gray-100 disabled:cursor-not-allowed"
                        >
                            <option value="">Loading racers...</option>
                        </select>
                        <button
                            onclick="clearRacerFilter()"
                            title="Clear Racer Filter"
                            class="flex-shrink-0 p-3 text-gray-400 hover:text-red-500 transition-colors bg-white border border-gray-300 rounded-lg shadow-sm active:bg-gray-50"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Checkboxes Row (Full Width) -->
            <div class="flex flex-wrap items-center gap-x-6 gap-y-2 pt-3 border-t border-gray-100">
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="standingsView" onchange="updateDisplay()" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                    <label for="standingsView" class="text-sm text-gray-600 cursor-pointer">Standings view</label>
                </div>
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="randomizeClassOrder" onchange="updateDisplay()" class="w-4 h-4 text-purple-600 rounded border-gray-300 focus:ring-purple-500">
                    <label for="randomizeClassOrder" class="text-sm text-gray-600 cursor-pointer">Randomize class order</label>
                </div>
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="showStationAnomalies" onchange="handleShowStationAnomaliesChange()" class="w-4 h-4 text-amber-600 rounded border-gray-300 focus:ring-amber-500 peer disabled:opacity-50 disabled:cursor-not-allowed">
                    <label for="showStationAnomalies" class="text-sm text-gray-600 cursor-pointer peer-disabled:opacity-50 peer-disabled:cursor-not-allowed">Show station anomalies</label>
                </div>
                <div id="tandemCheckboxGroup" class="flex items-center gap-2 hidden">
                    <input type="checkbox" id="showTandem" onchange="handleSelectionChange()" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                    <label for="showTandem" class="text-sm text-gray-600 cursor-pointer">Also show tandem results</label>
                </div>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loading" class="hidden flex flex-col items-center justify-center py-12">
            <div class="loading-spinner mb-4"></div>
            <p id="loadingText" class="text-gray-500 animate-pulse">Processing data...</p>
        </div>

        <!-- Errors Section -->
        <div id="errorsContainer" class="mb-8 hidden">
            <!-- Errors table will be injected here -->
        </div>

        <!-- Dashboard Section (Always Visible) -->
        <div id="statsDashboard" class="space-y-4 mb-8">
            <details class="bg-white rounded-xl shadow-md border border-gray-100 group">
                <summary class="p-6 cursor-pointer select-none flex items-center justify-between list-none outline-none [&::-webkit-details-marker]:hidden">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 w-full pr-4">
                        <div class="flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-600 flex-shrink-0"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
                            <h3 class="text-lg font-bold text-gray-800" id="distributionTitle">Overall Distribution Overview</h3>
                        </div>

                        <div class="flex flex-wrap items-center gap-x-6 gap-y-2 text-sm font-medium">
                            <label class="flex items-center gap-2 cursor-pointer select-none" onclick="event.stopPropagation()">
                                <input type="checkbox" id="showTime" checked onchange="updateCharts()" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                                <span class="text-blue-600">Raw Time</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer select-none" onclick="event.stopPropagation()">
                                <input type="checkbox" id="showScore" checked onchange="updateCharts()" class="w-4 h-4 text-emerald-600 rounded border-gray-300 focus:ring-emerald-500">
                                <span class="text-emerald-600">Total Score</span>
                            </label>
                        </div>
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400 transition-transform duration-200 group-open:rotate-180 flex-shrink-0"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </summary>

                <div class="px-6 pb-6 pt-0">
                    <div id="individualMarkerControls" class="flex flex-wrap items-center gap-x-6 gap-y-2 text-xs font-bold border-t border-gray-100 pt-3 mb-4 hidden">
                        <span class="text-gray-400 uppercase tracking-wider">Racer Markers:</span>
                        <label class="flex items-center gap-2 cursor-pointer select-none">
                            <input type="checkbox" id="showRacerTime" checked onchange="updateCharts()" class="w-4 h-4 text-blue-900 rounded border-gray-300 focus:ring-blue-900">
                            <span class="text-blue-900">Show Racer Time</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer select-none">
                            <input type="checkbox" id="showRacerScore" checked onchange="updateCharts()" class="w-4 h-4 text-emerald-900 rounded border-gray-300 focus:ring-emerald-500">
                            <span class="text-emerald-900">Show Racer Score</span>
                        </label>
                    </div>
                    <div class="h-64 w-full">
                        <canvas id="statsChart"></canvas>
                    </div>
                </div>
            </details>
        </div>

        <!-- Results Section (Always Visible below graph) -->
        <div id="resultsContainer" class="mb-8">
            <!-- Table will be injected here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-20 bg-gray-100 rounded-xl border-2 border-dashed border-gray-300">
            <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
            </svg>
            <h3 class="mt-2 text-sm font-medium text-gray-900">No data available</h3>
            <p class="mt-1 text-sm text-gray-500">The spreadsheet appears to be empty or misformatted.</p>
        </div>
    </div>

    <footer class="text-center text-xs text-gray-400 pb-8 mt-auto px-4">
        <p id="sourceInfo" class="truncate">Source: ...</p>
        <p id="dataSizeInfo" class="truncate mt-1"></p>
    </footer>

    <script type="module">
        import { 
            parseCSV, 
            parseToNumeric, 
            formatBytes, 
            processResultsData,
            checkStationAnomalies,
            COL_BIB,
            COL_NAME,
            COL_CLASS,
            COL_TIME,
            COL_SCORE,
            MIN_TIME_SAMPLE,
            MAX_TIME_SAMPLE
        } from './results.js';

        // Fallback Configuration
        const FALLBACK_RACES = {
            "races": [
                {
                    "name": "Farmington Slalom 2025",
                    "registration_url": "https://docs.google.com/spreadsheets/d/1gvGgLJ8jx9a8tfydTlQowOHLPJ_dG-0iW1iOfEvdIfs/edit?gid=844370283",
                    "results_url": "https://docs.google.com/spreadsheets/d/1gvGgLJ8jx9a8tfydTlQowOHLPJ_dG-0iW1iOfEvdIfs/edit?gid=1657054501#gid=1657054501"
                }
            ]
        };

        // Exclusions for dynamic columns
        const EXCLUDE_COLS = [
            'Indiv. Class Rank',
            'Individual Class Rank',
            'Total Touches',
            'Total Fifties',
            'Bib #',
            'Name',
            'Class',
            'Run',
            'Run #'
        ];

        const HEADER_MAP = {
            'Bib #': 'Bib',
            'Name': 'Name',
            'Raw Time': 'Raw',
            'Total Score': 'Score',
            'Class Rank': 'Rank',
            'Gates Touched': 'Touch',
            'Gates Fiftied': 'Fifty',
            'Total Penalties': 'Penalties'
        };

        const BUCKET_SIZE = 5;

        // State
        let currentRaces = [];
        let sheetId = '';
        let gid = '';
        let allData = [];
        let errorData = [];
        let anomalies = [];
        let allRacerRows = [];
        let statsChart = null;

        async function init() {
            await loadRaces();
        }

        async function loadRaces() {
            const raceSelect = document.getElementById('raceSelect');
            try {
                const response = await fetch('races.json');
                if (!response.ok) throw new Error('File not found');
                const data = await response.json();
                currentRaces = data.races;
            } catch (e) {
                currentRaces = FALLBACK_RACES.races;
            }

            // Sort currentRaces by date descending
            currentRaces.sort((a, b) => {
                const dA = a.date || '';
                const dB = b.date || '';
                return dB.localeCompare(dA);
            });

            raceSelect.innerHTML = '';
            currentRaces.forEach((race, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = race.name;
                raceSelect.appendChild(option);
            });

            if (currentRaces.length > 0) {
                const today = new Date();
                const target = new Date(today.getTime() + 7 * 24 * 60 * 60 * 1000);
                const targetYear = target.getFullYear();
                const targetMonth = String(target.getMonth() + 1).padStart(2, '0');
                const targetDay = String(target.getDate()).padStart(2, '0');
                const targetStr = `${targetYear}-${targetMonth}-${targetDay}`;

                let initialIndex = 0;
                for (let i = 0; i < currentRaces.length; i++) {
                    if (currentRaces[i].date && currentRaces[i].date <= targetStr) {
                        initialIndex = i;
                        break;
                    }
                }

                raceSelect.value = initialIndex;
                handleRaceChange();
            }
        }

        function handleRaceChange() {
            const raceIndex = document.getElementById('raceSelect').value;
            const race = currentRaces[raceIndex];
            if (!race) return;

            const url = race.results_url || '';
            const idMatch = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
            sheetId = idMatch ? idMatch[1] : '';

            const gidMatch = url.match(/[?&]gid=([0-9]+)/);
            gid = gidMatch ? gidMatch[1] : '0';

            document.getElementById('sourceInfo').innerText = `Sheet ID: ${sheetId} | GID: ${gid}`;

            document.getElementById('bibSelect').value = "";
            document.getElementById('classSelect').value = "";
            allData = [];
            errorData = [];
            anomalies = [];
            allRacerRows = [];

            const showAnomaliesCheckbox = document.getElementById('showStationAnomalies');
            if (showAnomaliesCheckbox) {
                if (race && race.raw_results_url) {
                    showAnomaliesCheckbox.disabled = false;
                } else {
                    showAnomaliesCheckbox.disabled = true;
                    showAnomaliesCheckbox.checked = false;
                }
            }

            preloadData();
        }

        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            const icon = document.getElementById('refreshIcon');
            const currentClass = document.getElementById('classSelect').value;
            const currentName = document.getElementById('bibSelect').value;

            btn.disabled = true;
            icon.classList.add('refresh-spin');

            await preloadData();

            if (currentClass) {
                document.getElementById('classSelect').value = currentClass;
                handleClassChange();
            }

            if (currentName) {
                document.getElementById('bibSelect').value = currentName;
                handleSelectionChange();
            }

            icon.classList.remove('refresh-spin');
            btn.disabled = false;
        }

        async function preloadData() {
            const bibSelect = document.getElementById('bibSelect');
            const classSelect = document.getElementById('classSelect');
            const loading = document.getElementById('loading');
            const emptyState = document.getElementById('emptyState');
            const statusMessage = document.getElementById('statusMessage');
            const errorsContainer = document.getElementById('errorsContainer');
            const dataSizeInfo = document.getElementById('dataSizeInfo');

            bibSelect.disabled = true;
            classSelect.disabled = true;
            loading.classList.remove('hidden');
            emptyState.classList.add('hidden');
            statusMessage.classList.add('hidden'); // Clear previous error messages
            if (errorsContainer) errorsContainer.classList.add('hidden');
            if (dataSizeInfo) dataSizeInfo.innerText = '';

            try {
                const url = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&t=${new Date().getTime()}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to fetch spreadsheet.');

                const csvText = await response.text();

                if (dataSizeInfo) {
                    const byteSize = new Blob([csvText]).size;
                    dataSizeInfo.innerText = `Data retrieved: ${formatBytes(byteSize)}`;
                }

                const { headers, rows } = parseCSV(csvText);

                if (!headers.includes(COL_BIB)) {
                    throw new Error(`Critical column "${COL_BIB}" not found.`);
                }

                allRacerRows = rows;

                const processed = processResultsData(rows);
                allData = processed.allData;
                errorData = processed.errorData;
                anomalies = [];

                // 2. Fetch raw results if raw_results_url is specified and checkbox is checked
                const showAnomaliesChecked = document.getElementById('showStationAnomalies') && document.getElementById('showStationAnomalies').checked;
                const raceIndex = document.getElementById('raceSelect').value;
                const race = currentRaces[raceIndex];
                if (showAnomaliesChecked && race && race.raw_results_url) {
                    const rawUrlMatch = race.raw_results_url.match(/\/d\/([a-zA-Z0-9-_]+)/);
                    const rawSheetId = rawUrlMatch ? rawUrlMatch[1] : '';
                    const rawGidMatch = race.raw_results_url.match(/[?&]gid=([0-9]+)/);
                    const rawGid = rawGidMatch ? rawGidMatch[1] : '0';
                    
                    if (rawSheetId && rawGid) {
                        try {
                            const rawUrl = `https://docs.google.com/spreadsheets/d/${rawSheetId}/export?format=csv&gid=${rawGid}&t=${new Date().getTime()}`;
                            const rawResponse = await fetch(rawUrl);
                            if (rawResponse.ok) {
                                const rawCsvText = await rawResponse.text();
                                const parsedRaw = parseCSV(rawCsvText);
                                anomalies = checkStationAnomalies(parsedRaw.rows);
                            }
                        } catch (rawErr) {
                            console.error('Failed to fetch raw results for anomaly check:', rawErr);
                        }
                    }
                }

                populateClassSelect(allData);
                classSelect.disabled = false;
                populateRunnerSelect(allData);
                bibSelect.disabled = false;

                updateDisplay();

            } catch (error) {
                console.error(error);
                showMessage(error.message, 'text-red-500');
                allData = [];
                errorData = [];
                anomalies = [];
                emptyState.classList.remove('hidden');
                // Hide table/results on failure
                document.getElementById('resultsContainer').innerHTML = '';
            } finally {
                loading.classList.add('hidden');
            }
        }

        function populateClassSelect(rows) {
            const classSelect = document.getElementById('classSelect');
            const previousValue = classSelect.value;
            const classes = [...new Set(rows.map(r => r[COL_CLASS]).filter(Boolean))].sort();

            classSelect.innerHTML = '<option value="">All Classes</option><option value="*COMBINE*">Combine all classes</option>';
            classes.forEach(cls => {
                const option = document.createElement('option');
                option.value = cls;
                option.textContent = cls;
                classSelect.appendChild(option);
            });

            if (classes.includes(previousValue) || previousValue === '*COMBINE*') {
                classSelect.value = previousValue;
            }
        }

        function handleClassChange() {
            const selectedClass = document.getElementById('classSelect').value;
            const bibSelect = document.getElementById('bibSelect');
            const currentRacerName = bibSelect.value;

            const filteredRows = (selectedClass && selectedClass !== '*COMBINE*')
                ? allData.filter(r => r[COL_CLASS] === selectedClass)
                : allData;

            populateRunnerSelect(filteredRows);

            if (currentRacerName) {
                const isStillInList = filteredRows.some(r => r[COL_NAME] === currentRacerName);
                if (isStillInList) {
                    bibSelect.value = currentRacerName;
                } else {
                    bibSelect.value = "";
                }
            }

            updateDisplay();

            document.getElementById('distributionTitle').textContent = (selectedClass && selectedClass !== '*COMBINE*')
                ? `Distribution: ${selectedClass}`
                : 'Overall Distribution Overview';
        }

        function populateRunnerSelect(rows) {
            const select = document.getElementById('bibSelect');
            const previousValue = select.value;
            const selectedClass = document.getElementById('classSelect').value;

            select.innerHTML = (selectedClass && selectedClass !== '*COMBINE*')
                ? `<option value="">All racers in ${selectedClass}</option>`
                : '<option value="">All racers</option>';

            const uniqueNames = [...new Set(rows.map(r => r[COL_NAME]).filter(Boolean))].sort();

            uniqueNames.forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                select.appendChild(option);
            });

            if (previousValue) select.value = previousValue;
        }

        function handleSelectionChange() {
            const nameValue = document.getElementById('bibSelect').value;
            const tandemGroup = document.getElementById('tandemCheckboxGroup');
            
            if (nameValue) {
                const otherNames = [...new Set(allData.map(r => r[COL_NAME]).filter(n => n && n !== nameValue))];
                const isSubstringOfOther = otherNames.some(n => n.includes(nameValue));
                
                if (isSubstringOfOther) {
                    tandemGroup.classList.remove('hidden');
                } else {
                    tandemGroup.classList.add('hidden');
                    document.getElementById('showTandem').checked = false;
                }
                
                const racerRows = allData.filter(r => {
                    if (document.getElementById('showTandem').checked) {
                        return r[COL_NAME] && r[COL_NAME].includes(nameValue);
                    } else {
                        return r[COL_NAME] === nameValue;
                    }
                });
                populateClassSelect(racerRows);
            } else {
                populateClassSelect(allData);
                tandemGroup.classList.add('hidden');
                document.getElementById('showTandem').checked = false;
            }
            updateDisplay();
        }

        function clearClassFilter() {
            const select = document.getElementById('classSelect');
            if (select.value !== "") {
                select.value = "";
                handleClassChange();
            }
        }

        function clearRacerFilter() {
            const select = document.getElementById('bibSelect');
            if (select.value !== "") {
                select.value = "";
                handleSelectionChange();
            }
        }

        function filterByName(name) {
            document.getElementById('classSelect').value = '';
            document.getElementById('bibSelect').value = name;
            handleSelectionChange();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function filterByClass(cls) {
            document.getElementById('bibSelect').value = '';
            document.getElementById('classSelect').value = cls;
            handleClassChange();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateDisplay() {
            const nameValue = document.getElementById('bibSelect').value;
            const classValue = document.getElementById('classSelect').value;
            const markerControls = document.getElementById('individualMarkerControls');
            const tandemGroup = document.getElementById('tandemCheckboxGroup');

            if (nameValue) {
                markerControls.classList.remove('hidden');
            } else {
                markerControls.classList.add('hidden');
            }

            let filteredResults = allData;
            const showTandem = tandemGroup && !tandemGroup.classList.contains('hidden') && document.getElementById('showTandem').checked;

            const racerFilter = (row) => {
                if (!nameValue) return true;
                if (showTandem) {
                    return row[COL_NAME] && row[COL_NAME].includes(nameValue);
                } else {
                    return row[COL_NAME] === nameValue;
                }
            };

            const classFilter = (row) => {
                if (!classValue || classValue === '*COMBINE*') return true;
                return row[COL_CLASS] === classValue;
            };

            const standingsView = document.getElementById('standingsView') && document.getElementById('standingsView').checked;
            const rankFilter = (row) => {
                if (!standingsView) return true;
                const rankValue = row['Class Rank'];
                return rankValue && rankValue.toString().trim() !== '';
            };

            filteredResults = allData.filter(row => classFilter(row) && racerFilter(row) && rankFilter(row));
            const filteredErrors = errorData.filter(row => classFilter(row) && racerFilter(row));

            const showAnomaliesChecked = document.getElementById('showStationAnomalies') && document.getElementById('showStationAnomalies').checked;
            let filteredAnomalies = showAnomaliesChecked ? anomalies : [];
            if (showAnomaliesChecked) {
                if (nameValue) {
                    const racerBibs = [...new Set(allData.filter(r => r[COL_NAME] === nameValue).map(r => (r['Bib #'] || '').toString().trim()))];
                    filteredAnomalies = filteredAnomalies.filter(a => racerBibs.includes(a.bib));
                }
                if (classValue && classValue !== '*COMBINE*') {
                    const classBibs = [...new Set(allData.filter(r => r[COL_CLASS] === classValue).map(r => (r['Bib #'] || '').toString().trim()))];
                    filteredAnomalies = filteredAnomalies.filter(a => classBibs.includes(a.bib));
                }
            }

            updateCharts();
            renderResults(filteredResults);
            renderErrors(filteredErrors, filteredAnomalies);
        }

        function updateCharts() {
            if (!allData || allData.length === 0) return;

            const selectedClass = document.getElementById('classSelect').value;
            const nameValue = document.getElementById('bibSelect').value;
            const showTime = document.getElementById('showTime').checked;
            const showScore = document.getElementById('showScore').checked;
            const showRacerTime = document.getElementById('showRacerTime').checked;
            const showRacerScore = document.getElementById('showRacerScore').checked;

            const dataToChart = (selectedClass && selectedClass !== '*COMBINE*')
                ? allData.filter(r => r[COL_CLASS] === selectedClass)
                : allData;

            const timeValues = dataToChart.map(r => parseToNumeric(r[COL_TIME])).filter(v => v !== null);
            const scoreValues = dataToChart.map(r => parseToNumeric(r[COL_SCORE])).filter(v => v !== null);

            const allValues = [...timeValues, ...scoreValues];
            if (allValues.length === 0) {
                if (statsChart) statsChart.destroy();
                return;
            }

            const actualMin = Math.min(...allValues);
            const actualMax = Math.max(...allValues);
            const minVal = Math.floor(actualMin / BUCKET_SIZE) * BUCKET_SIZE;
            const maxVal = Math.ceil(actualMax / BUCKET_SIZE) * BUCKET_SIZE;

            const labels = [];
            const timeCounts = [];
            const scoreCounts = [];

            for (let i = minVal; i <= maxVal; i += BUCKET_SIZE) {
                labels.push(`${i}-${i + BUCKET_SIZE}`);
                const tCount = timeValues.filter(v => v >= i && v < i + BUCKET_SIZE).length;
                const sCount = scoreValues.filter(v => v >= i && v < i + BUCKET_SIZE).length;
                timeCounts.push(tCount);
                scoreCounts.push(sCount);
            }

            const annotations = {};
            if (nameValue) {
                const showTandem = !document.getElementById('tandemCheckboxGroup').classList.contains('hidden') && document.getElementById('showTandem').checked;
                const racerFilter = (row) => showTandem ? (row[COL_NAME] && row[COL_NAME].includes(nameValue)) : row[COL_NAME] === nameValue;
                
                const racerRuns = (selectedClass && selectedClass !== '*COMBINE*')
                    ? allData.filter(row => row[COL_CLASS] === selectedClass && racerFilter(row))
                    : allData.filter(racerFilter);

                racerRuns.forEach((run, idx) => {
                    const runTime = parseToNumeric(run[COL_TIME]);
                    const runScore = parseToNumeric(run[COL_SCORE]);
                    if (runTime !== null && showRacerTime) {
                        const runTimePos = (runTime - minVal) / BUCKET_SIZE;
                        annotations[`timeLine_${idx}`] = {
                            type: 'line', xMin: runTimePos, xMax: runTimePos,
                            borderColor: 'rgba(30, 58, 138, 0.8)', borderWidth: 2, borderDash: [4, 4],
                            label: { display: false }
                        };
                    }
                    if (runScore !== null && showRacerScore) {
                        const runScorePos = (runScore - minVal) / BUCKET_SIZE;
                        annotations[`scoreLine_${idx}`] = {
                            type: 'line', xMin: runScorePos, xMax: runScorePos,
                            borderColor: 'rgba(6, 78, 59, 0.8)', borderWidth: 2, borderDash: [6, 2],
                            label: { display: false }
                        };
                    }
                });
            }

            const canvas = document.getElementById('statsChart');
            const ctx = canvas.getContext('2d');
            if (statsChart) statsChart.destroy();

            statsChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        ...(showTime ? [{
                            label: `Raw Time`, data: timeCounts, borderColor: 'rgb(59, 130, 246)',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)', borderWidth: 3, tension: 0.3, fill: true, pointRadius: 2
                        }] : []),
                        ...(showScore ? [{
                            label: `Total Score`, data: scoreCounts, borderColor: 'rgb(16, 185, 129)',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)', borderWidth: 3, tension: 0.3, fill: true, pointRadius: 2
                        }] : [])
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: { legend: { display: false }, annotation: { annotations: annotations } },
                    scales: {
                        y: { beginAtZero: true, title: { display: true, text: 'Count', font: { size: 10 } } },
                        x: { title: { display: true, text: 'Seconds', font: { size: 10 } }, grid: { display: false } }
                    }
                }
            });
        }

        function renderResults(results) {
            const container = document.getElementById('resultsContainer');
            if (!results || results.length === 0) {
                container.innerHTML = '<div class="text-center p-10 bg-white rounded-xl shadow italic text-gray-400 border-2 border-dashed">No matching results to display.</div>';
                return;
            }

            const isCombined = document.getElementById('classSelect') && document.getElementById('classSelect').value === '*COMBINE*';

            const groups = results.reduce((acc, row) => {
                const cls = isCombined ? 'All Racers' : (row[COL_CLASS] || 'Unclassified');
                if (!acc[cls]) acc[cls] = [];
                acc[cls].push(row);
                return acc;
            }, {});

            let sortedClasses = Object.keys(groups).sort();
            const randomize = document.getElementById('randomizeClassOrder') && document.getElementById('randomizeClassOrder').checked;
            if (randomize) {
                const today = new Date();
                const seed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
                let s = seed;
                const nextRand = () => {
                    let t = s += 0x6D2B79F5;
                    t = Math.imul(t ^ (t >>> 15), t | 1);
                    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
                    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
                };

                for (let i = sortedClasses.length - 1; i > 0; i--) {
                    const j = Math.floor(nextRand() * (i + 1));
                    [sortedClasses[i], sortedClasses[j]] = [sortedClasses[j], sortedClasses[i]];
                }
            }

            const dynamicKeys = [
                'Raw Time',
                'Total Penalties',
                'Total Score',
                'Gates Touched',
                'Gates Fiftied',
                'Class Rank'
            ];
            const colCount = 3 + dynamicKeys.length + (isCombined ? 1 : 0);

            let tableHtml = `
                <div class="md:hidden text-center mb-1 animate-pulse">
                    <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">← Scroll table for more →</span>
                </div>
                <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden relative">
                    <div class="overflow-x-auto scroll-shadow-container">
                        <table class="w-full text-sm text-left">
                            <thead class="bg-gray-50 text-gray-500 uppercase text-[10px] font-bold tracking-wider">
                                <tr>
                                    <th class="px-3 py-2 border-b border-gray-100">Bib</th>
                                    <th class="px-3 py-2 border-b border-gray-100">Name</th>
                                    ${isCombined ? '<th class="px-3 py-2 border-b border-gray-100">Class</th>' : ''}
                                    <th class="px-3 py-2 border-b border-gray-100">Run</th>
                                    ${dynamicKeys.map(key => `
                                        <th class="px-3 py-2 border-b border-gray-100 whitespace-nowrap">${HEADER_MAP[key] || key}</th>
                                    `).join('')}
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-50">
            `;

            sortedClasses.forEach(cls => {
                if (!isCombined) {
                    const safeCls = cls.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                    tableHtml += `
                        <tr class="bg-gray-100 group cursor-pointer hover:bg-gray-200 transition-colors" onclick="filterByClass('${safeCls}')" title="Filter to this class">
                            <td colspan="${colCount}" class="px-3 py-1 text-[10px] font-black text-gray-500 uppercase tracking-widest border-y border-gray-200 group-hover:text-blue-600">${cls}</td>
                        </tr>
                    `;
                }

                groups[cls].sort((a, b) => {
                    const scoreA = parseToNumeric(a['Total Score']);
                    const scoreB = parseToNumeric(b['Total Score']);
                    if (scoreA === null && scoreB === null) return 0;
                    if (scoreA === null) return 1;
                    if (scoreB === null) return -1;
                    return scoreA - scoreB;
                });

                groups[cls].forEach((row) => {
                    const runNum = row['Run #'] || row['Run'] || '1';
                    const bib = row['Bib #'] || '—';
                    const name = row['Name'] || '—';
                    const rowClass = row[COL_CLASS] || '—';
                    const safeName = name.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                    const safeRowClass = rowClass.replace(/'/g, "\\'").replace(/"/g, "&quot;");

                    tableHtml += `
                        <tr class="hover:bg-blue-50 transition-colors">
                            <td class="px-3 py-2 font-bold text-gray-900">${bib}</td>
                            <td class="px-3 py-2 text-gray-700 font-semibold truncate max-w-[120px] whitespace-nowrap cursor-pointer hover:text-blue-600 underline decoration-transparent hover:decoration-blue-600 transition-colors" onclick="filterByName('${safeName}')" title="Filter to this racer">${name}</td>
                            ${isCombined ? `<td class="px-3 py-2 text-gray-600 font-medium whitespace-nowrap cursor-pointer hover:text-blue-600 underline decoration-transparent hover:decoration-blue-600 transition-colors" onclick="filterByClass('${safeRowClass}')" title="Filter to this class">${rowClass}</td>` : ''}
                            <td class="px-3 py-2 font-bold text-blue-600">#${runNum}</td>
                            ${dynamicKeys.map(key => {
                                var val = row[key] || '—';
                                if (key === 'Gates Touched' || key === 'Gates Fiftied') {
                                    val = val.toString().replace(/Gate\s*#/gi, '').trim() || '0';
                                }
                                return `<td class="px-3 py-2 text-gray-700 font-medium whitespace-nowrap">${val}</td>`;
                            }).join('')}
                        </tr>
                    `;
                });
            });

            tableHtml += `
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            container.innerHTML = tableHtml;
        }

        function renderErrors(errorRows, anomaliesList = []) {
            const container = document.getElementById('errorsContainer');
            if (!container) return;
            
            if ((!errorRows || errorRows.length === 0) && (!anomaliesList || anomaliesList.length === 0)) {
                container.classList.add('hidden');
                container.innerHTML = '';
                return;
            }

            container.classList.remove('hidden');

            let html = '';

            if (errorRows && errorRows.length > 0) {
                html += `
                <details class="bg-red-50 rounded-xl shadow-md border border-red-200 group mb-4" open>
                    <summary class="text-lg font-bold text-red-800 p-6 cursor-pointer select-none flex items-center justify-between list-none outline-none [&::-webkit-details-marker]:hidden">
                        <div class="flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-red-600 flex-shrink-0"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                            <span>Reporting anomalies</span>
                            <span class="ml-2 bg-red-200 text-red-800 text-xs px-2.5 py-0.5 rounded-full font-bold">${errorRows.length}</span>
                        </div>
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-red-600 transition-transform duration-200 group-open:rotate-180"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </summary>
                    <div class="overflow-x-auto px-6 pb-6 pt-0">
                        <table class="w-full text-sm text-left">
                            <thead class="bg-red-100 text-red-800 uppercase text-[10px] font-bold tracking-wider">
                                <tr>
                                    <th class="px-3 py-2 border-b border-red-200">Bib</th>
                                    <th class="px-3 py-2 border-b border-red-200">Name</th>
                                    <th class="px-3 py-2 border-b border-red-200">Class</th>
                                    <th class="px-3 py-2 border-b border-red-200">Run</th>
                                    <th class="px-3 py-2 border-b border-red-200">Raw Time</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-red-100">
                                ${errorRows.map(row => {
                                    const bib = row['Bib #'] || '—';
                                    const name = row['Name'] || '—';
                                    const cls = row[COL_CLASS] || '—';
                                    const runNum = (row['Run #'] || row['Run'] || '1').toString().trim();
                                    const timeStr = row[COL_TIME] || '—';
                                    return `
                                        <tr class="hover:bg-red-100 transition-colors">
                                            <td class="px-3 py-2 font-bold text-red-900">${bib}</td>
                                            <td class="px-3 py-2 text-red-800 font-semibold">${name}</td>
                                            <td class="px-3 py-2 text-red-800">${cls}</td>
                                            <td class="px-3 py-2 font-bold text-red-800">${runNum}</td>
                                            <td class="px-3 py-2 text-red-800">${timeStr}</td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                </details>
                `;
            }

            if (anomaliesList && anomaliesList.length > 0) {
                html += `
                <details class="bg-amber-50 rounded-xl shadow-md border border-amber-200 group" open>
                    <summary class="text-lg font-bold text-amber-800 p-6 cursor-pointer select-none flex items-center justify-between list-none outline-none [&::-webkit-details-marker]:hidden">
                        <div class="flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-amber-600 flex-shrink-0"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                            <span>Station Anomalies</span>
                            <span class="ml-2 bg-amber-200 text-amber-800 text-xs px-2.5 py-0.5 rounded-full font-bold">${anomaliesList.length}</span>
                        </div>
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-amber-600 transition-transform duration-200 group-open:rotate-180"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </summary>
                    <div class="px-6 pb-6 pt-0">
                        <ul class="list-disc pl-5 space-y-2 text-amber-900 font-medium">
                            ${anomaliesList.map(a => {
                                const matched = allRacerRows.find(r => (r[COL_BIB] || '').toString().trim() === a.bib);
                                let displayMessage = a.message;
                                if (matched) {
                                    const name = matched[COL_NAME] || 'Unknown Racer';
                                    const cls = matched[COL_CLASS] || 'Unknown Class';
                                    displayMessage = a.message.replace(`Bib ${a.bib}`, `Bib ${a.bib} (${name} - ${cls})`);
                                }
                                return `<li>${displayMessage}</li>`;
                            }).join('')}
                        </ul>
                    </div>
                </details>
                `;
            }

            container.innerHTML = html;
        }

        function showMessage(text, colorClass) {
            const statusMessage = document.getElementById('statusMessage');
            statusMessage.innerText = text;
            statusMessage.className = `mt-2 text-sm font-medium ${colorClass}`;
            statusMessage.classList.remove('hidden');
        }

        async function handleShowStationAnomaliesChange() {
            const isChecked = document.getElementById('showStationAnomalies').checked;
            if (isChecked && anomalies.length === 0) {
                const loading = document.getElementById('loading');
                loading.classList.remove('hidden');
                try {
                    const raceIndex = document.getElementById('raceSelect').value;
                    const race = currentRaces[raceIndex];
                    if (race && race.raw_results_url) {
                        const rawUrlMatch = race.raw_results_url.match(/\/d\/([a-zA-Z0-9-_]+)/);
                        const rawSheetId = rawUrlMatch ? rawUrlMatch[1] : '';
                        const rawGidMatch = race.raw_results_url.match(/[?&]gid=([0-9]+)/);
                        const rawGid = rawGidMatch ? rawGidMatch[1] : '0';
                        
                        if (rawSheetId && rawGid) {
                            const rawUrl = `https://docs.google.com/spreadsheets/d/${rawSheetId}/export?format=csv&gid=${rawGid}&t=${new Date().getTime()}`;
                            const rawResponse = await fetch(rawUrl);
                            if (rawResponse.ok) {
                                const rawCsvText = await rawResponse.text();
                                const parsedRaw = parseCSV(rawCsvText);
                                anomalies = checkStationAnomalies(parsedRaw.rows);
                            }
                        }
                    }
                } catch (rawErr) {
                    console.error('Failed to fetch raw results for anomaly check:', rawErr);
                } finally {
                    loading.classList.add('hidden');
                }
            }
            updateDisplay();
        }

        // Expose functions called by HTML event attributes to window
        window.refreshData = refreshData;
        window.handleRaceChange = handleRaceChange;
        window.handleClassChange = handleClassChange;
        window.handleSelectionChange = handleSelectionChange;
        window.clearClassFilter = clearClassFilter;
        window.clearRacerFilter = clearRacerFilter;
        window.filterByName = filterByName;
        window.filterByClass = filterByClass;
        window.updateDisplay = updateDisplay;
        window.handleShowStationAnomaliesChange = handleShowStationAnomaliesChange;

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
