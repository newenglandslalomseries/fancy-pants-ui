<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Plugin for drawing vertical lines (annotations) -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.2.1/dist/chartjs-plugin-annotation.min.js"></script>
    <style>
        .loading-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }
        .refresh-spin {
            animation: spin 1s linear infinite;
        }
        /* Custom scrollbar for tight tables */
        .overflow-x-auto::-webkit-scrollbar {
            height: 4px;
        }
        .overflow-x-auto::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        /* Scroll shadow indicators: show shadows at the edges when content is overflowing and not at the end */
        .scroll-shadow-container {
            background:
                /* Shadow covers */
                linear-gradient(to right, white 30%, rgba(255, 255, 255, 0)),
                linear-gradient(to right, rgba(255, 255, 255, 0), white 70%) 100% 0,
                /* Shadows */
                radial-gradient(farthest-side at 0 50%, rgba(0, 0, 0, .12), rgba(0, 0, 0, 0)),
                radial-gradient(farthest-side at 100% 50%, rgba(0, 0, 0, .12), rgba(0, 0, 0, 0)) 100% 0;
            background-repeat: no-repeat;
            background-color: white;
            background-size: 40px 100%, 40px 100%, 14px 100%, 14px 100%;
            background-attachment: local, local, scroll, scroll;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-900">

    <div class="max-w-4xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-6">
            <h1 class="text-3xl font-extrabold text-blue-800 mb-2">Race Results</h1>
        </header>

        <!-- Race Selector Section (Space-saving flat layout) -->
        <div class="mb-6 px-1">
            <div class="flex items-center gap-2 w-full">
                <!-- Race Selector -->
                <div class="flex-1 min-w-0">
                    <select
                        id="raceSelect"
                        onchange="handleRaceChange()"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-white font-semibold text-blue-900 truncate"
                    >
                        <option value="">Loading races...</option>
                    </select>
                </div>

                <!-- Refresh Button -->
                <button
                    onclick="refreshData()"
                    id="refreshBtn"
                    title="Refresh data from sheet"
                    class="flex-shrink-0 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-all flex items-center justify-center shadow-sm active:transform active:scale-95"
                >
                    <svg id="refreshIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
                </button>
            </div>
            <div id="statusMessage" class="mt-2 text-sm hidden font-medium"></div>
        </div>

        <!-- Filter & Search Box -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-8 space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Class Filter Group -->
                <div class="w-full">
                    <label for="classSelect" class="block text-xs font-bold text-gray-400 uppercase mb-1 px-1">Class</label>
                    <div class="flex items-center gap-2">
                        <select
                            id="classSelect"
                            onchange="handleClassChange()"
                            disabled
                            class="flex-grow px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-white disabled:bg-gray-100 disabled:cursor-not-allowed"
                        >
                            <option value="">All Classes</option>
                        </select>
                        <button
                            onclick="clearClassFilter()"
                            title="Clear Class Filter"
                            class="flex-shrink-0 p-3 text-gray-400 hover:text-red-500 transition-colors bg-white border border-gray-300 rounded-lg shadow-sm active:bg-gray-50"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                </div>

                <!-- Racer Filter Group -->
                <div class="w-full">
                    <label for="bibSelect" class="block text-xs font-bold text-gray-400 uppercase mb-1 px-1">Racer</label>
                    <div class="flex items-center gap-2">
                        <select
                            id="bibSelect"
                            onchange="handleSelectionChange()"
                            disabled
                            class="flex-grow px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-white disabled:bg-gray-100 disabled:cursor-not-allowed"
                        >
                            <option value="">Loading racers...</option>
                        </select>
                        <button
                            onclick="clearRacerFilter()"
                            title="Clear Racer Filter"
                            class="flex-shrink-0 p-3 text-gray-400 hover:text-red-500 transition-colors bg-white border border-gray-300 rounded-lg shadow-sm active:bg-gray-50"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loading" class="hidden flex flex-col items-center justify-center py-12">
            <div class="loading-spinner mb-4"></div>
            <p id="loadingText" class="text-gray-500 animate-pulse">Processing data...</p>
        </div>

        <!-- Dashboard Section (Always Visible) -->
        <div id="statsDashboard" class="space-y-4 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-md border border-gray-100">
                <div class="flex flex-col gap-4 mb-6">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <h3 class="text-lg font-bold text-gray-800" id="distributionTitle">Overall Distribution Overview</h3>

                        <div class="flex flex-wrap items-center gap-x-6 gap-y-2 text-sm font-medium">
                            <label class="flex items-center gap-2 cursor-pointer select-none">
                                <input type="checkbox" id="showTime" checked onchange="updateCharts()" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                                <span class="text-blue-600">Raw Time</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer select-none">
                                <input type="checkbox" id="showScore" checked onchange="updateCharts()" class="w-4 h-4 text-emerald-600 rounded border-gray-300 focus:ring-emerald-500">
                                <span class="text-emerald-600">Total Score</span>
                            </label>
                        </div>
                    </div>

                    <div id="individualMarkerControls" class="flex flex-wrap items-center gap-x-6 gap-y-2 text-xs font-bold border-t border-gray-100 pt-3 hidden">
                        <span class="text-gray-400 uppercase tracking-wider">Racer Markers:</span>
                        <label class="flex items-center gap-2 cursor-pointer select-none">
                            <input type="checkbox" id="showRacerTime" checked onchange="updateCharts()" class="w-4 h-4 text-blue-900 rounded border-gray-300 focus:ring-blue-900">
                            <span class="text-blue-900">Show Racer Time</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer select-none">
                            <input type="checkbox" id="showRacerScore" checked onchange="updateCharts()" class="w-4 h-4 text-emerald-900 rounded border-gray-300 focus:ring-emerald-500">
                            <span class="text-emerald-900">Show Racer Score</span>
                        </label>
                    </div>
                </div>

                <div class="h-64 w-full">
                    <canvas id="statsChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Results Section (Always Visible below graph) -->
        <div id="resultsContainer" class="mb-8">
            <!-- Table will be injected here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-20 bg-gray-100 rounded-xl border-2 border-dashed border-gray-300">
            <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
            </svg>
            <h3 class="mt-2 text-sm font-medium text-gray-900">No data available</h3>
            <p class="mt-1 text-sm text-gray-500">The spreadsheet appears to be empty or misformatted.</p>
        </div>
    </div>

    <footer class="text-center text-xs text-gray-400 pb-8 mt-auto px-4">
        <p id="sourceInfo" class="truncate">Source: ...</p>
    </footer>

    <script>
        // Fallback Configuration
        const FALLBACK_RACES = {
            "races": [
                {
                    "name": "Farmington Slalom 2025",
                    "url": "https://docs.google.com/spreadsheets/d/1gvGgLJ8jx9a8tfydTlQowOHLPJ_dG-0iW1iOfEvdIfs/edit?gid=1657054501#gid=1657054501"
                }
            ]
        };

        const COL_BIB = 'Bib #';
        const COL_NAME = 'Name';
        const COL_CLASS = 'Class';
        const COL_TIME = 'Raw Time';
        const COL_SCORE = 'Total Score';

        // Exclusions for dynamic columns
        const EXCLUDE_COLS = [
            'Indiv. Class Rank',
            'Individual Class Rank',
            'Total Touches',
            'Total Fifties',
            'Bib #',
            'Name',
            'Class',
            'Run',
            'Run #'
        ];

        const HEADER_MAP = {
            'Bib #': 'Bib',
            'Name': 'Name',
            'Raw Time': 'Raw',
            'Total Score': 'Score',
            'Class Rank': 'Rank',
            'Gates Touched': 'Touch',
            'Gates Fiftied': 'Fifty',
            'Total Penalties': 'Penalties'
        };

        const BUCKET_SIZE = 5;
        const MIN_TIME_SAMPLE = 10;
        const MAX_TIME_SAMPLE = 900;

        // State
        let currentRaces = [];
        let sheetId = '';
        let gid = '';
        let allData = [];
        let statsChart = null;

        async function init() {
            await loadRaces();
        }

        async function loadRaces() {
            const raceSelect = document.getElementById('raceSelect');
            try {
                const response = await fetch('races.json');
                if (!response.ok) throw new Error('File not found');
                const data = await response.json();
                currentRaces = data.races;
            } catch (e) {
                currentRaces = FALLBACK_RACES.races;
            }

            raceSelect.innerHTML = '';
            currentRaces.forEach((race, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = race.name;
                raceSelect.appendChild(option);
            });

            if (currentRaces.length > 0) {
                handleRaceChange();
            }
        }

        function handleRaceChange() {
            const raceIndex = document.getElementById('raceSelect').value;
            const race = currentRaces[raceIndex];
            if (!race) return;

            const idMatch = race.url.match(/\/d\/([a-zA-Z0-9-_]+)/);
            sheetId = idMatch ? idMatch[1] : '';

            const gidMatch = race.url.match(/gid=([0-9]+)/);
            gid = gidMatch ? gidMatch[1] : '0';

            document.getElementById('sourceInfo').innerText = `Sheet ID: ${sheetId} | GID: ${gid}`;

            document.getElementById('bibSelect').value = "";
            document.getElementById('classSelect').value = "";
            allData = [];

            preloadData();
        }

        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            if (lines.length < 1) return { headers: [], rows: [] };

            const splitRow = (row) => {
                const result = [];
                let current = '';
                let inQuotes = false;
                for (let i = 0; i < row.length; i++) {
                    const char = row[i];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        result.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                result.push(current.trim());
                return result.map(v => v.replace(/^"|"$/g, ''));
            };

            // Detect if headers are in row 1 or 2 by looking for "Bib #"
            let headerIdx = 1; // Default to row 2
            if (lines[0]) {
                const firstRowCols = splitRow(lines[0]);
                if (firstRowCols.includes(COL_BIB)) {
                    headerIdx = 0;
                }
            }

            const headers = splitRow(lines[headerIdx]);
            const results = [];

            // Start data processing from the row immediately after headers
            for (let i = headerIdx + 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const values = splitRow(lines[i]);
                const obj = {};
                headers.forEach((header, index) => {
                    if (header) {
                        obj[header] = values[index] || '';
                    }
                });
                results.push(obj);
            }
            return { headers, rows: results };
        }

        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            const icon = document.getElementById('refreshIcon');
            const currentClass = document.getElementById('classSelect').value;
            const currentName = document.getElementById('bibSelect').value;

            btn.disabled = true;
            icon.classList.add('refresh-spin');

            await preloadData();

            if (currentClass) {
                document.getElementById('classSelect').value = currentClass;
                handleClassChange();
            }

            if (currentName) {
                document.getElementById('bibSelect').value = currentName;
                handleSelectionChange();
            }

            icon.classList.remove('refresh-spin');
            btn.disabled = false;
        }

        async function preloadData() {
            const bibSelect = document.getElementById('bibSelect');
            const classSelect = document.getElementById('classSelect');
            const loading = document.getElementById('loading');
            const emptyState = document.getElementById('emptyState');
            const statusMessage = document.getElementById('statusMessage');

            bibSelect.disabled = true;
            classSelect.disabled = true;
            loading.classList.remove('hidden');
            emptyState.classList.add('hidden');
            statusMessage.classList.add('hidden'); // Clear previous error messages

            try {
                const url = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&t=${new Date().getTime()}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to fetch spreadsheet.');

                const csvText = await response.text();
                const { headers, rows } = parseCSV(csvText);

                if (!headers.includes(COL_BIB)) {
                    throw new Error(`Critical column "${COL_BIB}" not found.`);
                }

                allData = rows.filter(row => {
                    const time = parseToNumeric(row[COL_TIME]);
                    return time === null || (time >= MIN_TIME_SAMPLE && time <= MAX_TIME_SAMPLE);
                });

                populateClassSelect(allData);
                classSelect.disabled = false;
                populateRunnerSelect(allData);
                bibSelect.disabled = false;

                updateDisplay();

            } catch (error) {
                console.error(error);
                showMessage(error.message, 'text-red-500');
                allData = [];
                emptyState.classList.remove('hidden');
                // Hide table/results on failure
                document.getElementById('resultsContainer').innerHTML = '';
            } finally {
                loading.classList.add('hidden');
            }
        }

        function populateClassSelect(rows) {
            const classSelect = document.getElementById('classSelect');
            const previousValue = classSelect.value;
            const classes = [...new Set(rows.map(r => r[COL_CLASS]).filter(Boolean))].sort();

            classSelect.innerHTML = '<option value="">All Classes</option>';
            classes.forEach(cls => {
                const option = document.createElement('option');
                option.value = cls;
                option.textContent = cls;
                classSelect.appendChild(option);
            });

            if (classes.includes(previousValue)) {
                classSelect.value = previousValue;
            }
        }

        function handleClassChange() {
            const selectedClass = document.getElementById('classSelect').value;
            const bibSelect = document.getElementById('bibSelect');
            const currentRacerName = bibSelect.value;

            const filteredRows = selectedClass
                ? allData.filter(r => r[COL_CLASS] === selectedClass)
                : allData;

            populateRunnerSelect(filteredRows);

            if (currentRacerName) {
                const isStillInList = filteredRows.some(r => r[COL_NAME] === currentRacerName);
                if (isStillInList) {
                    bibSelect.value = currentRacerName;
                } else {
                    bibSelect.value = "";
                }
            }

            updateDisplay();

            document.getElementById('distributionTitle').textContent = selectedClass
                ? `Distribution: ${selectedClass}`
                : 'Overall Distribution Overview';
        }

        function populateRunnerSelect(rows) {
            const select = document.getElementById('bibSelect');
            const previousValue = select.value;
            const selectedClass = document.getElementById('classSelect').value;

            select.innerHTML = selectedClass
                ? `<option value="">-- All racers in ${selectedClass} --</option>`
                : '<option value="">-- All racers --</option>';

            const uniqueNames = [...new Set(rows.map(r => r[COL_NAME]).filter(Boolean))].sort();

            uniqueNames.forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                select.appendChild(option);
            });

            if (previousValue) select.value = previousValue;
        }

        function handleSelectionChange() {
            const nameValue = document.getElementById('bibSelect').value;
            if (nameValue) {
                const racerRows = allData.filter(r => r[COL_NAME] === nameValue);
                populateClassSelect(racerRows);
            } else {
                populateClassSelect(allData);
            }
            updateDisplay();
        }

        function clearClassFilter() {
            const select = document.getElementById('classSelect');
            if (select.value !== "") {
                select.value = "";
                handleClassChange();
            }
        }

        function clearRacerFilter() {
            const select = document.getElementById('bibSelect');
            if (select.value !== "") {
                select.value = "";
                handleSelectionChange();
            }
        }

        function updateDisplay() {
            const nameValue = document.getElementById('bibSelect').value;
            const classValue = document.getElementById('classSelect').value;
            const markerControls = document.getElementById('individualMarkerControls');

            if (nameValue) {
                markerControls.classList.remove('hidden');
            } else {
                markerControls.classList.add('hidden');
            }

            let filteredResults = allData;
            if (classValue && nameValue) {
                filteredResults = allData.filter(row => row[COL_CLASS] === classValue && row[COL_NAME] === nameValue);
            } else if (classValue) {
                filteredResults = allData.filter(row => row[COL_CLASS] === classValue);
            } else if (nameValue) {
                filteredResults = allData.filter(row => row[COL_NAME] === nameValue);
            }

            updateCharts();
            renderResults(filteredResults);
        }

        function parseToNumeric(val) {
            if (!val) return null;
            if (typeof val === 'number') return val;
            if (typeof val === 'string' && val.includes(':')) {
                const parts = val.split(':').map(Number);
                if (parts.length === 2) return (parts[0] * 60) + parts[1];
                if (parts.length === 3) return (parts[0] * 3600) + (parts[1] * 60) + parts[2];
            }
            const num = parseFloat(val);
            return isNaN(num) ? null : num;
        }

        function updateCharts() {
            if (!allData || allData.length === 0) return;

            const selectedClass = document.getElementById('classSelect').value;
            const nameValue = document.getElementById('bibSelect').value;
            const showTime = document.getElementById('showTime').checked;
            const showScore = document.getElementById('showScore').checked;
            const showRacerTime = document.getElementById('showRacerTime').checked;
            const showRacerScore = document.getElementById('showRacerScore').checked;

            const dataToChart = selectedClass
                ? allData.filter(r => r[COL_CLASS] === selectedClass)
                : allData;

            const timeValues = dataToChart.map(r => parseToNumeric(r[COL_TIME])).filter(v => v !== null);
            const scoreValues = dataToChart.map(r => parseToNumeric(r[COL_SCORE])).filter(v => v !== null);

            const allValues = [...timeValues, ...scoreValues];
            if (allValues.length === 0) {
                if (statsChart) statsChart.destroy();
                return;
            }

            const actualMin = Math.min(...allValues);
            const actualMax = Math.max(...allValues);
            const minVal = Math.floor(actualMin / BUCKET_SIZE) * BUCKET_SIZE;
            const maxVal = Math.ceil(actualMax / BUCKET_SIZE) * BUCKET_SIZE;

            const labels = [];
            const timeCounts = [];
            const scoreCounts = [];

            for (let i = minVal; i <= maxVal; i += BUCKET_SIZE) {
                labels.push(`${i}-${i + BUCKET_SIZE}`);
                const tCount = timeValues.filter(v => v >= i && v < i + BUCKET_SIZE).length;
                const sCount = scoreValues.filter(v => v >= i && v < i + BUCKET_SIZE).length;
                timeCounts.push(tCount);
                scoreCounts.push(sCount);
            }

            const annotations = {};
            if (nameValue) {
                const racerRuns = selectedClass
                    ? allData.filter(row => row[COL_NAME] === nameValue && row[COL_CLASS] === selectedClass)
                    : allData.filter(row => row[COL_NAME] === nameValue);

                racerRuns.forEach((run, idx) => {
                    const runTime = parseToNumeric(run[COL_TIME]);
                    const runScore = parseToNumeric(run[COL_SCORE]);
                    if (runTime !== null && showRacerTime) {
                        const runTimePos = (runTime - minVal) / BUCKET_SIZE;
                        annotations[`timeLine_${idx}`] = {
                            type: 'line', xMin: runTimePos, xMax: runTimePos,
                            borderColor: 'rgba(30, 58, 138, 0.8)', borderWidth: 2, borderDash: [4, 4],
                            label: { display: false }
                        };
                    }
                    if (runScore !== null && showRacerScore) {
                        const runScorePos = (runScore - minVal) / BUCKET_SIZE;
                        annotations[`scoreLine_${idx}`] = {
                            type: 'line', xMin: runScorePos, xMax: runScorePos,
                            borderColor: 'rgba(6, 78, 59, 0.8)', borderWidth: 2, borderDash: [6, 2],
                            label: { display: false }
                        };
                    }
                });
            }

            const canvas = document.getElementById('statsChart');
            const ctx = canvas.getContext('2d');
            if (statsChart) statsChart.destroy();

            statsChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        ...(showTime ? [{
                            label: `Raw Time`, data: timeCounts, borderColor: 'rgb(59, 130, 246)',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)', borderWidth: 3, tension: 0.3, fill: true, pointRadius: 2
                        }] : []),
                        ...(showScore ? [{
                            label: `Total Score`, data: scoreCounts, borderColor: 'rgb(16, 185, 129)',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)', borderWidth: 3, tension: 0.3, fill: true, pointRadius: 2
                        }] : [])
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: { legend: { display: false }, annotation: { annotations: annotations } },
                    scales: {
                        y: { beginAtZero: true, title: { display: true, text: 'Count', font: { size: 10 } } },
                        x: { title: { display: true, text: 'Seconds', font: { size: 10 } }, grid: { display: false } }
                    }
                }
            });
        }

        function renderResults(results) {
            const container = document.getElementById('resultsContainer');
            if (!results || results.length === 0) {
                container.innerHTML = '<div class="text-center p-10 bg-white rounded-xl shadow italic text-gray-400 border-2 border-dashed">No matching results to display.</div>';
                return;
            }

            const groups = results.reduce((acc, row) => {
                const cls = row[COL_CLASS] || 'Unclassified';
                if (!acc[cls]) acc[cls] = [];
                acc[cls].push(row);
                return acc;
            }, {});

            const sortedClasses = Object.keys(groups).sort();

            const allKeys = Object.keys(results[0]);
            const dynamicKeys = allKeys.filter(key => !EXCLUDE_COLS.includes(key));
            const colCount = 3 + dynamicKeys.length;

            let tableHtml = `
                <div class="md:hidden text-center mb-1 animate-pulse">
                    <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">← Scroll table for more →</span>
                </div>
                <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden relative">
                    <div class="overflow-x-auto scroll-shadow-container">
                        <table class="w-full text-sm text-left">
                            <thead class="bg-gray-50 text-gray-500 uppercase text-[10px] font-bold tracking-wider">
                                <tr>
                                    <th class="px-3 py-2 border-b border-gray-100">Bib</th>
                                    <th class="px-3 py-2 border-b border-gray-100">Name</th>
                                    <th class="px-3 py-2 border-b border-gray-100">Run</th>
                                    ${dynamicKeys.map(key => `
                                        <th class="px-3 py-2 border-b border-gray-100 whitespace-nowrap">${HEADER_MAP[key] || key}</th>
                                    `).join('')}
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-50">
            `;

            sortedClasses.forEach(cls => {
                tableHtml += `
                    <tr class="bg-gray-100">
                        <td colspan="${colCount}" class="px-3 py-1 text-[10px] font-black text-gray-500 uppercase tracking-widest border-y border-gray-200">${cls}</td>
                    </tr>
                `;

                groups[cls].forEach((row) => {
                    const runNum = row['Run #'] || row['Run'] || '1';
                    const bib = row['Bib #'] || '—';
                    const name = row['Name'] || '—';

                    tableHtml += `
                        <tr class="hover:bg-blue-50 transition-colors">
                            <td class="px-3 py-2 font-bold text-gray-900">${bib}</td>
                            <td class="px-3 py-2 text-gray-700 font-semibold truncate max-w-[120px] whitespace-nowrap">${name}</td>
                            <td class="px-3 py-2 font-bold text-blue-600">#${runNum}</td>
                            ${dynamicKeys.map(key => {
                                let val = row[key] || '—';
                                if (key === 'Gates Touched' || key === 'Gates Fiftied') {
                                    val = val.toString().replace(/Gate\s*#/gi, '').trim() || '0';
                                }
                                return `<td class="px-3 py-2 text-gray-700 font-medium whitespace-nowrap">${val}</td>`;
                            }).join('')}
                        </tr>
                    `;
                });
            });

            tableHtml += `
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            container.innerHTML = tableHtml;
        }

        function showMessage(text, colorClass) {
            const statusMessage = document.getElementById('statusMessage');
            statusMessage.innerText = text;
            statusMessage.className = `mt-2 text-sm font-medium ${colorClass}`;
            statusMessage.classList.remove('hidden');
        }

        window.onload = init;
    </script>
</body>
</html>
