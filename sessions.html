<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paddling Race Session Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }

        .refresh-spin {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .loading-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 1s linear infinite;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen text-gray-800 p-6">

    <div class="max-w-6xl mx-auto space-y-6">
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Race Session Optimizer</h1>

        <!-- Race Selector Section -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 mb-6">
            <div class="flex items-center gap-2 w-full">
                <!-- Race Selector -->
                <div class="flex-1 min-w-0">
                    <select id="raceSelect" onchange="handleRaceChange()"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-white font-semibold text-blue-900 truncate">
                        <option value="">Loading races...</option>
                    </select>
                </div>

                <!-- Refresh Button -->
                <button onclick="refreshData()" id="refreshBtn" title="Refresh data from sheet"
                    class="flex-shrink-0 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-all flex items-center justify-center shadow-sm active:transform active:scale-95">
                    <svg id="refreshIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                        <path d="M3 3v5h5" />
                        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
                        <path d="M16 16h5v5" />
                    </svg>
                </button>
            </div>
            <div id="statusMessage" class="mt-2 text-sm hidden font-medium text-gray-600"></div>
            <div id="sourceInfo" class="mt-1 text-xs text-gray-400 truncate">Source: Loading...</div>
        </div>

        <!-- Loading State -->
        <div id="loading"
            class="hidden flex flex-col items-center justify-center py-12 bg-white rounded-xl shadow-sm border border-gray-100">
            <div class="loading-spinner mb-4"></div>
            <p id="loadingText" class="text-gray-500 animate-pulse">Loading registration data...</p>
        </div>

        <!-- Optimization Controls -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <div class="flex flex-wrap items-center gap-4">
                    <div class="flex items-center space-x-3 bg-gray-50 border border-gray-200 p-2 rounded-lg">
                        <label for="maxDiff" class="text-sm font-medium text-gray-700 whitespace-nowrap ml-1">Max Boat
                            Difference:</label>
                        <input type="number" id="maxDiff" value="5" min="0"
                            class="w-20 p-1.5 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500 font-mono text-sm text-center">
                    </div>

                    <div class="flex items-center space-x-3 bg-gray-50 border border-gray-200 p-2 rounded-lg">
                        <label for="missingBibs"
                            class="text-sm font-medium text-gray-700 whitespace-nowrap ml-1">Missing Bibs:</label>
                        <input type="text" id="missingBibs" placeholder="e.g. 5, 12, 15-20"
                            class="w-48 p-1.5 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
                    </div>
                </div>

                <div class="flex items-center space-x-4">
                    <div id="status" class="text-sm font-medium text-gray-500"></div>
                    <button onclick="processData()" id="optimizeBtn"
                        class="px-6 py-2.5 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition-colors shadow-sm focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:bg-gray-400 disabled:cursor-not-allowed">
                        Optimize Sessions
                    </button>
                </div>
            </div>
        </div>

        <div id="results" class="hidden space-y-6">
            <!-- Overlapping Racers List -->
            <div id="overlapRacersContainer" class="hidden bg-white p-6 rounded-xl shadow-sm border border-red-100">
                <h3 class="text-lg font-semibold text-red-800 mb-3 flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                        </path>
                    </svg>
                    Racers in Both Sessions
                </h3>
                <ul id="overlapRacersList" class="list-disc pl-5 text-gray-700 space-y-1"></ul>
            </div>

            <!-- Exclusive Racers List -->
            <div id="exclusiveRacersContainer" class="hidden grid md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-emerald-100">
                    <h3 class="text-lg font-semibold text-emerald-800 mb-3">Racers Only in Session A</h3>
                    <ul id="onlyARacersList" class="list-disc pl-5 text-gray-700 space-y-1"></ul>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-purple-100">
                    <h3 class="text-lg font-semibold text-purple-800 mb-3">Racers Only in Session B</h3>
                    <ul id="onlyBRacersList" class="list-disc pl-5 text-gray-700 space-y-1"></ul>
                </div>
            </div>

            <!-- Sessions Breakdown (Spreadsheet Friendly) -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div
                    class="bg-gray-800 text-white px-6 py-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <div>
                        <h3 class="text-xl font-bold">Sessions Breakdown</h3>
                        <div class="text-sm text-gray-300">Select and copy the table below, or click "Copy registration
                            data" to paste directly.</div>
                    </div>
                    <button onclick="copyRegistrationData(this)"
                        class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold rounded transition-colors shadow-sm focus:ring-2 focus:ring-blue-400 focus:ring-offset-2">
                        Copy registration data
                    </button>
                </div>
                <div class="p-0 overflow-x-auto">
                    <div id="spreadsheetTableContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State
        let currentRaces = [];
        let sheetId = '';
        let loadedTsvText = '';

        // --- 1. Basic TSV Parser ---
        function parseTSV(text) {
            let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0, l;
            for (l of text) {
                if ('"' === l) {
                    if (s && l === p) row[i] += l;
                    s = !s;
                } else if ('\t' === l && s) l = row[++i] = '';
                else if ('\n' === l && s) {
                    if ('\r' === p) row[i] = row[i].slice(0, -1);
                    row = ret[++r] = [l = '']; i = 0;
                } else row[i] += l;
                p = l;
            }
            return ret;
        }

        // --- 2. Simulated Annealing for Constrained Optimization ---
        // Fast meta-heuristic to find a balance between minimum overlap and boat limits.
        function runSimulatedAnnealing(N_CLASSES, racerClassArray, classBoatArray, maxDiff, timeLimitMs = 500) {
            function evaluate(state) {
                let boatsA = 0, boatsB = 0;
                for (let i = 0; i < N_CLASSES; i++) {
                    if (state[i]) boatsA += classBoatArray[i];
                    else boatsB += classBoatArray[i];
                }
                let diff = Math.abs(boatsA - boatsB);

                let overlap = 0;
                for (let i = 0; i < racerClassArray.length; i++) {
                    let hasA = false, hasB = false;
                    for (let j = 0; j < racerClassArray[i].length; j++) {
                        if (state[racerClassArray[i][j]]) hasA = true;
                        else hasB = true;
                    }
                    if (hasA && hasB) overlap++;
                }

                let valid = diff <= maxDiff;
                // Base cost is overlap. Difference breaks ties.
                let cost = overlap * 10000 + diff;

                // Heavy penalty for invalid states (violating boat diff constraint)
                if (!valid) {
                    cost += 10000000 + diff * 100000;
                }
                return { cost, overlap, diff, boatsA, boatsB, valid };
            }

            let bestGlobalState = null;
            let bestGlobalEval = { cost: Infinity };
            let startTime = performance.now();

            // Run until time budget expires to guarantee responsive UI with max search space exploration
            while (performance.now() - startTime < timeLimitMs) {
                // Random initial state
                let state = Array.from({ length: N_CLASSES }, () => Math.random() > 0.5);
                let currentEval = evaluate(state);

                let temp = 100.0;
                const minTemp = 0.001;
                const alpha = 0.95; // Fast cooling to allow many restarts

                while (temp > minTemp && performance.now() - startTime < timeLimitMs) {
                    // Batch inner iterations to avoid constant time-checking overhead
                    for (let i = 0; i < 500; i++) {
                        let flip1 = Math.floor(Math.random() * N_CLASSES);
                        let flip2 = -1;

                        // 50% chance to swap two elements instead of flipping one
                        if (Math.random() < 0.5 && N_CLASSES > 1) {
                            flip2 = Math.floor(Math.random() * N_CLASSES);
                            let attempts = 0;
                            while (state[flip1] === state[flip2] && attempts < 5) {
                                flip2 = Math.floor(Math.random() * N_CLASSES);
                                attempts++;
                            }
                            if (state[flip1] === state[flip2]) flip2 = -1; // Fallback to 1 flip if can't find opposites easily
                        }

                        // Apply neighbor transition
                        state[flip1] = !state[flip1];
                        if (flip2 !== -1) state[flip2] = !state[flip2];

                        let nextEval = evaluate(state);

                        // Acceptance logic (allow worse states probabilistically based on temperature)
                        if (nextEval.cost < currentEval.cost || Math.exp((currentEval.cost - nextEval.cost) / temp) > Math.random()) {
                            currentEval = nextEval;
                            if (currentEval.cost < bestGlobalEval.cost) {
                                bestGlobalEval = currentEval;
                                bestGlobalState = [...state];
                            }
                        } else {
                            // Revert transition
                            state[flip1] = !state[flip1];
                            if (flip2 !== -1) state[flip2] = !state[flip2];
                        }
                    }
                    temp *= alpha;
                }
            }
            return { state: bestGlobalState || Array(N_CLASSES).fill(true), eval: bestGlobalEval };
        }

        // --- 3. Main Processing Logic ---
        function processData() {
            const statusEl = document.getElementById('status');
            const csvText = loadedTsvText.trim();
            const maxDiffInput = parseInt(document.getElementById('maxDiff').value, 10);
            const maxDiff = isNaN(maxDiffInput) ? 5 : Math.max(0, maxDiffInput);

            if (!csvText) {
                alert("No registration data loaded. Please select a race.");
                return;
            }

            statusEl.textContent = "Processing...";

            setTimeout(() => {
                try {
                    let lines = parseTSV(csvText);
                    if (lines.length < 2) throw new Error("Registration data has no data rows.");

                    let header = lines[0].map(h => (h || '').toLowerCase().trim());
                    let nameIdx = header.findIndex(h => h.includes('name'));
                    let classesIdx = header.findIndex(h => h.includes('class'));
                    let partnersIdx = header.findIndex(h => h.includes('tandem') || h.includes('partner'));

                    if (nameIdx === -1 || classesIdx === -1 || partnersIdx === -1) {
                        throw new Error("Could not find required columns: 'Name', 'Race Classes', 'Tandem Boat Partner(s)'.");
                    }

                    let racerMap = new Map(); // normName -> Set(classes)
                    let originalNames = new Map(); // normName -> Display Name
                    let classesSet = new Set();
                    let parsedRows = [];

                    // Pass 1: Parse Data & build base maps
                    for (let i = 1; i < lines.length; i++) {
                        let row = lines[i];
                        if (!row || row.length <= Math.max(nameIdx, classesIdx, partnersIdx)) continue;

                        let name = (row[nameIdx] || "").trim();
                        if (!name) continue;

                        let normName = name.toLowerCase();
                        if (!racerMap.has(normName)) {
                            racerMap.set(normName, new Set());
                            originalNames.set(normName, name);
                        }

                        let classesList = (row[classesIdx] || "").split(',').map(s => s.trim()).filter(s => s);
                        let partnersList = (row[partnersIdx] || "").split(',').map(s => s.trim()).filter(s => s);

                        let pIdx = 0;
                        let partnerMap = {}; // cls -> normPartner

                        for (let cls of classesList) {
                            classesSet.add(cls);
                            racerMap.get(normName).add(cls);

                            if (cls.includes('2')) {
                                let partnerName = (pIdx < partnersList.length) ? partnersList[pIdx] : "";
                                pIdx++;
                                if (partnerName) {
                                    let normPartner = partnerName.toLowerCase().trim();
                                    partnerMap[cls] = normPartner;

                                    // Ensure partner is also known to the system even if they lack their own row
                                    if (!racerMap.has(normPartner)) {
                                        racerMap.set(normPartner, new Set());
                                        originalNames.set(normPartner, partnerName);
                                    }
                                    racerMap.get(normPartner).add(cls);
                                }
                            }
                        }

                        parsedRows.push({ normName, classes: classesList, partnerMap });
                    }

                    let C = Array.from(classesSet);
                    if (C.length < 2) {
                        throw new Error("Not enough distinct classes found to split into two sessions.");
                    }

                    // Count boats carefully, merging tandem partners
                    let classBoaters = {};
                    for (let cls of C) {
                        let pairs = [];
                        let solos = [];

                        for (let row of parsedRows) {
                            if (row.classes.includes(cls)) {
                                if (cls.includes('2') && row.partnerMap[cls]) {
                                    pairs.push([row.normName, row.partnerMap[cls]]);
                                } else {
                                    solos.push(row.normName);
                                }
                            }
                        }

                        let finalBoats = [];
                        let pairedRacers = new Set(); // store normName

                        for (let [p1, p2] of pairs) {
                            if (!pairedRacers.has(p1) && !pairedRacers.has(p2)) {
                                pairedRacers.add(p1);
                                pairedRacers.add(p2);
                                let name1 = originalNames.get(p1) || p1;
                                let name2 = originalNames.get(p2) || p2;
                                finalBoats.push(`${name1} & ${name2}`);
                            }
                        }

                        for (let solo of solos) {
                            if (!pairedRacers.has(solo)) {
                                finalBoats.push(originalNames.get(solo) || solo);
                            }
                        }
                        classBoaters[cls] = finalBoats;
                    }

                    // Extract multi-class racers for overlap logic
                    let multiRacers = [];
                    for (let [racer, classes] of racerMap.entries()) {
                        if (classes.size >= 2) {
                            multiRacers.push(Array.from(classes).map(c => C.indexOf(c)));
                        }
                    }

                    // Map string arrays to index arrays for fast computing
                    let classBoatArray = C.map(c => classBoaters[c].length);

                    // Run the optimizer
                    const { state, eval: resultEval } = runSimulatedAnnealing(C.length, multiRacers, classBoatArray, maxDiff, 600);

                    // Reconstruct sets
                    let sessionA = [], sessionB = [];
                    for (let i = 0; i < C.length; i++) {
                        if (state[i]) sessionA.push(C[i]);
                        else sessionB.push(C[i]);
                    }

                    // Find exactly who is overlapping
                    let setA_Names = new Set(sessionA);
                    let overlappingRacers = [];
                    let onlyARacers = [];
                    let onlyBRacers = [];

                    for (let [normName, classes] of racerMap.entries()) {
                        let inA = false, inB = false;
                        for (let cls of classes) {
                            if (setA_Names.has(cls)) inA = true;
                            else inB = true;
                        }
                        if (inA && inB) {
                            overlappingRacers.push(originalNames.get(normName));
                        } else if (inA) {
                            onlyARacers.push(originalNames.get(normName));
                        } else if (inB) {
                            onlyBRacers.push(originalNames.get(normName));
                        }
                    }

                    overlappingRacers.sort();
                    onlyARacers.sort();
                    onlyBRacers.sort();

                    renderResults(sessionA, sessionB, overlappingRacers, onlyARacers, onlyBRacers, resultEval, classBoaters);
                    statusEl.textContent = "";

                } catch (e) {
                    alert("Error: " + e.message);
                    statusEl.textContent = "";
                }
            }, 50);
        }

        function getMissingBibs() {
            const val = document.getElementById('missingBibs').value;
            const missing = new Set();
            if (!val) return missing;

            const tokens = val.split(/[,\s]+/);
            for (let token of tokens) {
                token = token.trim();
                if (!token) continue;

                if (token.includes('-')) {
                    const parts = token.split('-');
                    if (parts.length === 2) {
                        const start = parseInt(parts[0], 10);
                        const end = parseInt(parts[1], 10);
                        if (!isNaN(start) && !isNaN(end)) {
                            const low = Math.min(start, end);
                            const high = Math.max(start, end);
                            for (let n = low; n <= high; n++) {
                                missing.add(n);
                            }
                        }
                    }
                } else {
                    const num = parseInt(token, 10);
                    if (!isNaN(num)) {
                        missing.add(num);
                    }
                }
            }
            return missing;
        }

        function renderResults(sessionA, sessionB, overlaps, onlyA, onlyB, evalResult, classBoaters) {
            document.getElementById('results').classList.remove('hidden');

            const overlapsContainer = document.getElementById('overlapRacersContainer');
            const overlapsList = document.getElementById('overlapRacersList');
            if (overlaps.length > 0) {
                overlapsContainer.classList.remove('hidden');
                overlapsList.innerHTML = overlaps.map(n => `<li class="py-1">${n}</li>`).join('');
            } else {
                overlapsContainer.classList.add('hidden');
            }

            const exclusiveContainer = document.getElementById('exclusiveRacersContainer');
            if (onlyA.length > 0 || onlyB.length > 0) {
                exclusiveContainer.classList.remove('hidden');
                document.getElementById('onlyARacersList').innerHTML = onlyA.length ? onlyA.map(n => `<li class="py-1">${n}</li>`).join('') : '<li class="py-1 text-gray-400 italic">None</li>';
                document.getElementById('onlyBRacersList').innerHTML = onlyB.length ? onlyB.map(n => `<li class="py-1">${n}</li>`).join('') : '<li class="py-1 text-gray-400 italic">None</li>';
            } else {
                exclusiveContainer.classList.add('hidden');
            }

            // Build columns for the spreadsheet table
            const missingSet = getMissingBibs();
            let nextBib = 1;
            function getNextBib() {
                while (missingSet.has(nextBib)) {
                    nextBib++;
                }
                return nextBib++;
            }

            let tsvRows = ["Class\tBib#\tWork Assignment\t\tName\tSession"];

            let colA = [];
            sessionA.sort().forEach((cls) => {
                colA.push({ type: 'empty' }); // Blank line before each class name
                colA.push({ type: 'class', name: cls });
                classBoaters[cls].sort().forEach(b => {
                    let bib = getNextBib();
                    colA.push({ type: 'boat', bib: bib, name: b });
                    tsvRows.push(`${cls}\t${bib}\t\t\t${b}\tSession A`);
                });
            });

            let colB = [];
            sessionB.sort().forEach((cls) => {
                colB.push({ type: 'empty' }); // Blank line before each class name
                colB.push({ type: 'class', name: cls });
                classBoaters[cls].sort().forEach(b => {
                    let bib = getNextBib();
                    colB.push({ type: 'boat', bib: bib, name: b });
                    tsvRows.push(`${cls}\t${bib}\t\t\t${b}\tSession B`);
                });
            });

            window.lastGeneratedRegistrationTSV = tsvRows.join('\n');

            let maxRows = Math.max(colA.length, colB.length);
            let tableHTML = `
                <table class="w-full text-left border-collapse min-w-full">
                    <thead>
                        <tr>
                            <th colspan="2" class="p-3 border-b-2 border-r border-gray-200 bg-emerald-50 text-emerald-900 w-1/2">
                                <div class="font-bold text-lg">Session A</div>
                                <div class="font-normal text-sm mt-1">${sessionA.length} classes | ${evalResult.boatsA} boats</div>
                            </th>
                            <th colspan="2" class="p-3 border-b-2 border-gray-200 bg-purple-50 text-purple-900 w-1/2">
                                <div class="font-bold text-lg">Session B</div>
                                <div class="font-normal text-sm mt-1">${sessionB.length} classes | ${evalResult.boatsB} boats</div>
                            </th>
                        </tr>
                    </thead>
                    <tbody class="text-sm text-gray-800">
            `;

            for (let i = 0; i < maxRows; i++) {
                let itemA = colA[i] || { type: 'empty' };
                let itemB = colB[i] || { type: 'empty' };

                let tdA = '';
                if (itemA.type === 'empty') {
                    tdA = `<td colspan="2" class="p-2 border-r border-b border-gray-200 h-6"></td>`;
                } else if (itemA.type === 'class') {
                    tdA = `<td colspan="2" class="p-2 border-r border-b border-gray-200 align-top bg-emerald-50/50"><strong>${itemA.name}</strong></td>`;
                } else if (itemA.type === 'boat') {
                    tdA = `
                        <td class="p-2 border-b border-gray-200 align-top w-12 text-gray-500 font-mono">${itemA.bib}</td>
                        <td class="p-2 border-r border-b border-gray-200 align-top">${itemA.name}</td>
                    `;
                }

                let tdB = '';
                if (itemB.type === 'empty') {
                    tdB = `<td colspan="2" class="p-2 border-b border-gray-200 h-6"></td>`;
                } else if (itemB.type === 'class') {
                    tdB = `<td colspan="2" class="p-2 border-b border-gray-200 align-top bg-purple-50/50"><strong>${itemB.name}</strong></td>`;
                } else if (itemB.type === 'boat') {
                    tdB = `
                        <td class="p-2 border-b border-gray-200 align-top w-12 text-gray-500 font-mono">${itemB.bib}</td>
                        <td class="p-2 border-b border-gray-200 align-top">${itemB.name}</td>
                    `;
                }

                tableHTML += `
                    <tr class="hover:bg-gray-50 transition-colors">
                        ${tdA}
                        ${tdB}
                    </tr>
                `;
            }
            tableHTML += `</tbody></table>`;

            document.getElementById('spreadsheetTableContainer').innerHTML = tableHTML;
        }

        function copyRegistrationData(button) {
            if (!window.lastGeneratedRegistrationTSV) {
                alert("No registration data generated yet. Please optimize sessions first.");
                return;
            }
            navigator.clipboard.writeText(window.lastGeneratedRegistrationTSV).then(() => {
                const originalText = button.textContent;
                button.textContent = "Copied!";
                button.classList.remove('bg-blue-600', 'hover:bg-blue-500');
                button.classList.add('bg-emerald-600', 'hover:bg-emerald-500');
                setTimeout(() => {
                    button.textContent = originalText;
                    button.classList.remove('bg-emerald-600', 'hover:bg-emerald-500');
                    button.classList.add('bg-blue-600', 'hover:bg-blue-500');
                }, 2000);
            }).catch(err => {
                alert("Failed to copy data: " + err);
            });
        }

        // --- 4. Race Loading and Selector logic ---
        async function init() {
            await loadRaces();
        }

        async function loadRaces() {
            const raceSelect = document.getElementById('raceSelect');
            try {
                const response = await fetch('races.json');
                if (!response.ok) throw new Error('File not found');
                const data = await response.json();
                currentRaces = data.races;
            } catch (e) {
                currentRaces = [
                    {
                        "name": "Farmington Slalom 2025",
                        "url": "https://docs.google.com/spreadsheets/d/1gvGgLJ8jx9a8tfydTlQowOHLPJ_dG-0iW1iOfEvdIfs/edit?gid=1657054501#gid=1657054501"
                    }
                ];
            }

            raceSelect.innerHTML = '';
            currentRaces.forEach((race, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = race.name;
                raceSelect.appendChild(option);
            });

            if (currentRaces.length > 0) {
                handleRaceChange();
            }
        }

        function handleRaceChange() {
            const raceIndex = document.getElementById('raceSelect').value;
            const race = currentRaces[raceIndex];
            if (!race) return;

            const idMatch = race.url.match(/\/d\/([a-zA-Z0-9-_]+)/);
            sheetId = idMatch ? idMatch[1] : '';

            document.getElementById('sourceInfo').innerText = `Sheet ID: ${sheetId} | GID: 1684271407`;
            document.getElementById('statusMessage').classList.add('hidden');
            document.getElementById('results').classList.add('hidden');

            preloadData();
        }

        async function preloadData() {
            const select = document.getElementById('raceSelect');
            const refreshBtn = document.getElementById('refreshBtn');
            const refreshIcon = document.getElementById('refreshIcon');
            const statusMessage = document.getElementById('statusMessage');
            const loading = document.getElementById('loading');
            const optimizeBtn = document.getElementById('optimizeBtn');

            select.disabled = true;
            refreshBtn.disabled = true;
            refreshIcon.classList.add('refresh-spin');
            loading.classList.remove('hidden');
            statusMessage.classList.add('hidden');
            optimizeBtn.disabled = true;

            try {
                const url = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=tsv&gid=1684271407&t=${new Date().getTime()}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to fetch spreadsheet. Make sure it is shared or public.');

                loadedTsvText = await response.text();

                statusMessage.textContent = `Loaded ${loadedTsvText.length} characters of registration data.`;
                statusMessage.classList.remove('hidden');
                statusMessage.className = "mt-2 text-sm font-medium text-emerald-600";
                optimizeBtn.disabled = false;

                // Run optimization automatically on load
                processData();
            } catch (error) {
                console.error(error);
                statusMessage.textContent = error.message;
                statusMessage.classList.remove('hidden');
                statusMessage.className = "mt-2 text-sm font-medium text-red-500";
                loadedTsvText = '';
            } finally {
                loading.classList.add('hidden');
                select.disabled = false;
                refreshBtn.disabled = false;
                refreshIcon.classList.remove('refresh-spin');
            }
        }

        async function refreshData() {
            await preloadData();
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
